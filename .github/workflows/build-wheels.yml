name: Build & Publish Cython Wheels

on:
  push:
    tags:
      - 'v*'

jobs:
  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22.0
        with:
          package-dir: core
          output-dir: wheelhouse
        env:
          # Python versions to build for
          CIBW_BUILD: "cp310-* cp311-* cp312-*"
          # Skip 32-bit and musllinux
          CIBW_SKIP: "*-win32 *-manylinux_i686 *-musllinux_*"
          # Architectures
          CIBW_ARCHS_MACOS: "x86_64 arm64"
          CIBW_ARCHS_LINUX: "x86_64"
          # Install Cython in build environment (before pip wheel runs)
          CIBW_BEFORE_BUILD: "pip install 'cython>=3.0' setuptools wheel"
          # Skip testing in CI — dependencies (duckdb, pyarrow) need
          # pre-built wheels which aren't always available for all platforms
          CIBW_TEST_SKIP: "*"
          # Ensure build uses setup.py not just pyproject.toml metadata
          CIBW_BUILD_FRONTEND: "pip"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  # Also build a pure Python sdist (source distribution) as fallback
  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        run: |
          cd core
          pip install build
          python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: core/dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # For trusted publishing

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
